<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalPFC — Блюда</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar-root"></aside>

  <!-- CONTENT -->
  <div class="page-wrap">
    <header>
      <div>
        <h1>Блюда</h1>
        <p class="subtitle">Все сохранённые блюда с КБЖУ на 100 г</p>
      </div>
      <button id="nav-login" class="nav-login-btn" data-state="guest">Вход</button>
    </header>

    <main>
      <section class="add-food">
        <h2 id="form-title">Добавить блюдо</h2>
        <form id="catalog-form">
          <div class="form-row">
            <label style="flex:2; min-width:200px">
              Название
              <input type="text" id="cat-name" placeholder="Борщ, котлеты, плов…" autocomplete="off" required />
              <div id="cat-ac-list" style="position:relative"></div>
              <span id="cat-name-error" class="field-error"></span>
            </label>
          </div>
          <div class="form-row">
            <label>
              Калории (на 100 г)
              <input type="number" id="cat-cal" min="0" step="1" placeholder="0" />
            </label>
            <label>
              Белки (г на 100 г)
              <input type="text" inputmode="decimal" id="cat-p" data-macro placeholder="0.0" />
            </label>
            <label>
              Жиры (г на 100 г)
              <input type="text" inputmode="decimal" id="cat-f" data-macro placeholder="0.0" />
            </label>
            <label>
              Углеводы (г на 100 г)
              <input type="text" inputmode="decimal" id="cat-c" data-macro placeholder="0.0" />
            </label>
          </div>
          <!-- Состав блюда -->
          <div class="ingredients-section">
            <div class="ingredients-header">
              <span class="ingredients-label">Состав блюда</span>
              <div class="product-picker-wrap">
                <input type="text" id="dish-product-search" placeholder="Найти продукт из справочника…" autocomplete="off" />
                <div id="dish-product-ac" style="position:relative"></div>
              </div>
            </div>
            <div id="dish-ingredients"></div>
            <div id="dish-percent-hint" class="field-error"></div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary" id="catalog-submit-btn">Добавить блюдо</button>
            <button type="button" class="btn-cancel" id="catalog-cancel-btn" style="display:none">Отмена</button>
          </div>
        </form>
      </section>

      <section class="food-list">
        <h2>Блюда (<span id="count">0</span>)</h2>
        <table class="catalog-table">
          <thead>
            <tr>
              <th>#</th>
              <th data-col="name">Название</th>
              <th data-col="calories">Ккал</th>
              <th data-col="protein">Белки</th>
              <th data-col="fat">Жиры</th>
              <th data-col="carbs">Углеводы</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="catalog-tbody">
            <tr class="empty-row">
              <td colspan="7">Загрузка…</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="toast"></div>
  <script src="utils.js"></script>
  <script src="macros.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="dishes.js"></script>
</body>
</html>
